name: QUAM pytest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:
    inputs:
      repo_name:
        description: "Repository name to use for checkout - set from external repositories only"
        required: false
        type: string
        default: ${{ github.repository }}
      branch_name:
        description: "Branch name to use for checkout - external repositories should set to their main branch"
        required: false
        type: string
        default: ${{ github.ref }}
      whl_artifact_names:
        description: "Comma-separated list of wheel artifact names to install as dependencies"
        required: false
        type: string
        default: ""
      python_versions:
        description: "Python versions to test (JSON array, e.g. '[\"3.11\", \"3.12\"]')"
        required: false
        type: string
        default: '["3.9", "3.10", "3.11", "3.12"]'
      operating_systems:
        description: "Operating systems to test (JSON array, e.g. '[\"ubuntu-latest\", \"macos-latest\"]')"
        required: false
        type: string
        default: '["ubuntu-latest"]'

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python_versions || '["3.9", "3.10", "3.11", "3.12"]') }}
        os: ${{ fromJson(inputs.operating_systems || '["ubuntu-latest"]') }}

    steps:
    - uses: actions/checkout@v4
      with:
        repository: ${{ inputs.repo_name || github.repository }}
        ref: ${{ inputs.branch_name || github.ref }}

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
        cache-dependency-path: pyproject.toml

    - name: Download whl artifacts
      if: ${{ inputs.whl_artifact_names != '' }}
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.whl_artifact_names }}
        path: whl_artifacts/

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Install whl artifacts
      if: ${{ inputs.whl_artifact_names != '' }}
      run: pip install whl_artifacts/*.whl

    - name: Run pytest and generate a report
      run: pytest --junitxml=pytest-report.xml --cov=quam --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v4
      with:
        files: coverage.xml
        flags: py${{ matrix.python-version }}
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Surface failing tests
      if: always()
      uses: pmeier/pytest-results-action@main
      with:
        path: pytest-report.xml
        summary: true
        display-options: fEX
        fail-on-empty: true
        title: Test results
